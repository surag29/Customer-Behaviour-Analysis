<svg viewBox="0 0 1200 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#5a1f36"/>
    </marker>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fbeef2"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="480" fill="#fffaf9"/>

  <!-- Title -->
  <text x="600" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#2b1220">Customer Shopping Behavior Analysis — Pipeline Architecture</text>

  <!-- Stage boxes -->
  <!-- 1. Raw Data -->
  <rect x="30" y="150" width="180" height="140" rx="14" fill="url(#cardGrad)" stroke="#c0446b" stroke-width="2"/>
  <text x="120" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#5a1f36">Raw Dataset</text>
  <text x="120" y="205" text-anchor="middle" font-size="12" fill="#4a3540">customer_shopping</text>
  <text x="120" y="221" text-anchor="middle" font-size="12" fill="#4a3540">_behavior.csv</text>
  <text x="120" y="245" text-anchor="middle" font-size="11" fill="#7a5a66">3,900 rows</text>
  <text x="120" y="261" text-anchor="middle" font-size="11" fill="#7a5a66">18 features</text>

  <!-- 2. Python EDA -->
  <rect x="260" y="130" width="200" height="180" rx="14" fill="url(#cardGrad)" stroke="#c0446b" stroke-width="2"/>
  <text x="360" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#5a1f36">Python (Pandas)</text>
  <text x="360" y="178" text-anchor="middle" font-size="12" fill="#4a3540">customer-eda.ipynb</text>
  <text x="278" y="203" font-size="11" fill="#4a3540">• Load &amp; inspect (info/describe)</text>
  <text x="278" y="221" font-size="11" fill="#4a3540">• Impute missing ratings</text>
  <text x="278" y="239" font-size="11" fill="#4a3540">  (median per category)</text>
  <text x="278" y="257" font-size="11" fill="#4a3540">• snake_case columns</text>
  <text x="278" y="275" font-size="11" fill="#4a3540">• Feature engineering</text>
  <text x="278" y="293" font-size="11" fill="#4a3540">  (age_group, freq_days)</text>

  <!-- 3. PostgreSQL -->
  <rect x="510" y="130" width="200" height="180" rx="14" fill="url(#cardGrad)" stroke="#c0446b" stroke-width="2"/>
  <text x="610" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#5a1f36">PostgreSQL</text>
  <text x="610" y="178" text-anchor="middle" font-size="12" fill="#4a3540">customer-analysis.sql</text>
  <text x="528" y="203" font-size="11" fill="#4a3540">• SQLAlchemy load (df.to_sql)</text>
  <text x="528" y="221" font-size="11" fill="#4a3540">• 10 business queries</text>
  <text x="528" y="239" font-size="11" fill="#4a3540">• CTEs, window functions</text>
  <text x="528" y="257" font-size="11" fill="#4a3540">• Aggregations &amp; segmentation</text>
  <text x="528" y="275" font-size="11" fill="#4a3540">  (New / Returning / Loyal)</text>

  <!-- 4. Power BI -->
  <rect x="760" y="130" width="200" height="180" rx="14" fill="url(#cardGrad)" stroke="#c0446b" stroke-width="2"/>
  <text x="860" y="160" text-anchor="middle" font-size="15" font-weight="700" fill="#5a1f36">Power BI</text>
  <text x="860" y="178" text-anchor="middle" font-size="12" fill="#4a3540">Interactive Dashboard</text>
  <text x="778" y="203" font-size="11" fill="#4a3540">• 3 KPI cards</text>
  <text x="778" y="221" font-size="11" fill="#4a3540">• Revenue &amp; sales by category</text>
  <text x="778" y="239" font-size="11" fill="#4a3540">• Revenue / sales by age group</text>
  <text x="778" y="257" font-size="11" fill="#4a3540">• Subscription split</text>
  <text x="778" y="275" font-size="11" fill="#4a3540">• Filters: gender, category,</text>
  <text x="778" y="293" font-size="11" fill="#4a3540">  shipping, subscription</text>

  <!-- 5. Deliverables -->
  <rect x="1010" y="150" width="160" height="140" rx="14" fill="url(#cardGrad)" stroke="#c0446b" stroke-width="2"/>
  <text x="1090" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#5a1f36">Deliverables</text>
  <text x="1028" y="205" font-size="11" fill="#4a3540">• Business report (PDF)</text>
  <text x="1028" y="223" font-size="11" fill="#4a3540">• Stakeholder deck (PPTX)</text>
  <text x="1028" y="241" font-size="11" fill="#4a3540">• Dashboard screenshot</text>
  <text x="1028" y="259" font-size="11" fill="#4a3540">• Recommendations</text>

  <!-- Arrows -->
  <line x1="210" y1="220" x2="258" y2="220" stroke="#5a1f36" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="460" y1="220" x2="508" y2="220" stroke="#5a1f36" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="710" y1="220" x2="758" y2="220" stroke="#5a1f36" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="960" y1="220" x2="1008" y2="220" stroke="#5a1f36" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Bottom labels -->
  <text x="120" y="330" text-anchor="middle" font-size="11" fill="#9a7a86" font-style="italic">Ingestion</text>
  <text x="360" y="330" text-anchor="middle" font-size="11" fill="#9a7a86" font-style="italic">Cleaning &amp; EDA</text>
  <text x="610" y="330" text-anchor="middle" font-size="11" fill="#9a7a86" font-style="italic">Business Query Layer</text>
  <text x="860" y="330" text-anchor="middle" font-size="11" fill="#9a7a86" font-style="italic">Visualization</text>
  <text x="1090" y="330" text-anchor="middle" font-size="11" fill="#9a7a86" font-style="italic">Reporting</text>

  <!-- footer -->
  <text x="600" y="440" text-anchor="middle" font-size="12" fill="#7a5a66">CSV → Python (Pandas, Jupyter) → PostgreSQL (SQL) → Power BI → Report / Presentation</text>
</svg>
